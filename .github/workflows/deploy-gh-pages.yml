# Deploy LeetLean as a static site to GitHub Pages
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL       — Your Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  — Your Supabase anonymous/public key
#
# Optional secrets:
#   NEXT_PUBLIC_LEAN4WEB_URL       — Lean4Web instance URL (default: https://live.lean-lang.org)
#
# Enable GitHub Pages:
#   Settings → Pages → Source → GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_LEETLEAN_SERVERLESS: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_LEAN4WEB_URL: ${{ secrets.NEXT_PUBLIC_LEAN4WEB_URL }}
          # For project repos, set to /<repo-name>. For user repos, leave empty.
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
        run: npm run build:static

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
